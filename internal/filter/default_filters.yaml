filters:
  strip_ansi: true
  collapse_blank_lines: 3
  collapse_repeated_lines: 3
  collapse_passing_tests: 5

  drop_lines:
    # Progress bars
    - pattern: "\\[([#=\\-]+|\\s*)\\]"
      category: "progress-bar"
    - pattern: "\\d+%\\s*[|│]?[█▓▒░▏▎▍▌▋▊▉]"
      category: "progress-bar"
    - pattern: "^\\s*downloading.*\\.\\.\\."
      category: "progress-bar"

    # npm noise
    - pattern: "^npm warn"
      category: "npm-warn"
    - pattern: "^npm notice"
      category: "npm-notice"
    - pattern: "^npm http"
      category: "npm-http"

    # pip and cargo noise handled by deduplication rules below
    # (dedup stores original text for retrieval, drop_lines deletes permanently)

    # git transfer noise
    - pattern: "^remote:\\s*(Counting|Compressing|Enumerating)"
      category: "git-transfer"
    - pattern: "^(Receiving|Resolving) objects:"
      category: "git-transfer"
    - pattern: "^remote:\\s*Total\\s"
      category: "git-transfer"

    # Docker build noise
    - pattern: "^Step \\d+/\\d+ :"
      category: "docker"
    - pattern: "^\\s*---> [a-f0-9]+"
      category: "docker"
    - pattern: "^Removing intermediate container"
      category: "docker"
    - pattern: "^\\s*Successfully built [a-f0-9]+"
      category: "docker"

    # make noise
    - pattern: "^make\\[\\d+\\]: (Entering|Leaving) directory"
      category: "make"

  # Deduplication: collapse blocks of N+ matching consecutive lines,
  # store original in SQLite, replace with summary + retrieval command.
  deduplication_min_lines: 10  # heuristic fallback threshold

  deduplication:
    # npm install listings
    - pattern: "^\\s*(added|removed)\\s+\\d+\\s+package"
      category: "npm-install"
      min_lines: 5
    # pip package listings
    - pattern: "^\\s*(Collecting|Downloading|Using cached|Installing collected|Successfully installed)\\s"
      category: "pip-install"
      min_lines: 3
    # cargo build output
    - pattern: "^\\s*(Compiling|Downloading|Downloaded)\\s"
      category: "cargo-build"
      min_lines: 5
    # File path listings (ls, find, tree output)
    - pattern: "^[\\s]*[/\\.][\\w/\\.\\-]+$"
      category: "file-listing"
      min_lines: 15
    # Compiler warnings (gcc/clang style)
    - pattern: "^.*:\\d+:\\d+:\\s*(warning|note):"
      category: "compiler-warning"
      min_lines: 10
    # JavaScript stack traces
    - pattern: "^\\s+at\\s+"
      category: "stack-trace"
      min_lines: 8
    # Python stack traces
    - pattern: "^\\s+File\\s+\""
      category: "stack-trace"
      min_lines: 5
